## 工作流配置
workflow:
  tmuxPrefix: huhoo-
  worktreeBase: /root/.openclaw/workspace/huhoo/worktrees
  checkInterval: 600  # 10 分钟
  maxRestarts: 3

## 质量门禁
quality:
  typescriptCheck: true
  unitTests: true
  e2eTests: true
  screenshotRequired: true  # UI 改动必须附带截图
